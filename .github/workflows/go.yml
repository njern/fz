name: Go

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install developer tools
        run: make install-tools

      - name: Show tool versions
        run: make tools-versions

      - name: Build
        run: make build

      - name: Run CI checks
        run: make ci
